<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pide una frase y cuenta cuántas letras “a” contiene.</title>
</head>
<body>
    
    <script>
       let frase = prompt("Introduce una frase:");
        let contador = 0;

        for (let i = 0; i < frase.length; i++) {
            if (frase[i].toLowerCase() === "a") {
                contador++;
            }
        }

        alert("La frase contiene " + contador + " letras a"); 
    </script>
</body>
</html>
