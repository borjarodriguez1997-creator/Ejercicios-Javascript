<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pide un número y di si está entre 10 y 20, 
        incluidos ambos, usando una sola condición con &&.</title>
</head>
<body>
    <script>
        let numero = parseInt (prompt("Introduce un número:"));

        if (numero >= 10 && numero <=20){
            alert ("El número está entre 10 y 20");
        }
        else { alert ("El número no está entre 10 y 20");
        }
    </script>
</body>
</html>
